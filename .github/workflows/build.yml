name: Cross-platform build

on:
  push:
    branches:
      - main
      - slint
    tags:
      - "v*"
  pull_request:
    branches:
      - main
      - slint
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Tag to publish, for example v0.1.0. Leave empty to build only."
        required: false
        type: string
      prerelease:
        description: "Mark the published release as a prerelease."
        required: false
        default: false
        type: boolean

permissions:
  contents: read

jobs:
  detect:
    name: Detect project layout
    runs-on: ubuntu-latest
    outputs:
      project_layout: ${{ steps.layout.outputs.project_layout }}
      release_dir: ${{ steps.layout.outputs.release_dir }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Detect project layout
        id: layout
        shell: bash
        run: |
          if [[ -f src-tauri/Cargo.toml ]]; then
            echo "project_layout=tauri" >> "$GITHUB_OUTPUT"
            echo "release_dir=src-tauri/target/release" >> "$GITHUB_OUTPUT"
          elif [[ -f Cargo.toml ]]; then
            echo "project_layout=root" >> "$GITHUB_OUTPUT"
            echo "release_dir=target/release" >> "$GITHUB_OUTPUT"
          else
            echo "No Rust project manifest found." >&2
            exit 1
          fi

  build:
    name: Build ${{ matrix.name }}
    needs: detect
    runs-on: ${{ matrix.os }}
    env:
      PROJECT_LAYOUT: ${{ needs.detect.outputs.project_layout }}
      RELEASE_DIR: ${{ needs.detect.outputs.release_dir }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Windows
            os: windows-latest
            artifact: windows
            binary: megadown.exe
            tauri_bundles: nsis
          - name: macOS
            os: macos-latest
            artifact: macos
            binary: megadown
            tauri_bundles: dmg
          - name: Linux
            os: ubuntu-latest
            artifact: linux
            binary: megadown
            tauri_bundles: deb,appimage

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Linux system dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libayatana-appindicator3-dev \
            libfontconfig1-dev \
            libgtk-3-dev \
            libjavascriptcoregtk-4.1-dev \
            librsvg2-dev \
            libsoup-3.0-dev \
            libwebkit2gtk-4.1-dev \
            libwayland-dev \
            libx11-dev \
            libx11-xcb-dev \
            libxcb-render0-dev \
            libxcb-shape0-dev \
            libxcb-xfixes0-dev \
            libxcb1-dev \
            libxkbcommon-dev \
            libxkbcommon-x11-dev \
            patchelf

      - name: Setup Rust
        shell: bash
        run: |
          rustup toolchain install stable --profile minimal
          rustup default stable

      - name: Setup Node.js
        if: env.PROJECT_LAYOUT == 'tauri'
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Resolve package name
        shell: bash
        env:
          RELEASE_TAG: ${{ inputs.release_tag }}
        run: |
          ref_name="${RELEASE_TAG:-$GITHUB_REF_NAME}"
          safe_ref_name="${ref_name//\//-}"
          echo "PACKAGE_NAME=MegaDown-${safe_ref_name}-${{ matrix.artifact }}" >> "$GITHUB_ENV"

      - name: Install frontend dependencies
        if: env.PROJECT_LAYOUT == 'tauri'
        run: npm ci

      - name: Build Slint branch
        if: env.PROJECT_LAYOUT == 'root'
        run: cargo build --release --locked

      - name: Verify Tauri icon
        if: env.PROJECT_LAYOUT == 'tauri'
        shell: bash
        run: |
          test -f src-tauri/icons/icon.png
          test -f src-tauri/icons/icon.ico

      - name: Build Tauri app bundle
        if: env.PROJECT_LAYOUT == 'tauri'
        run: npm run build -- --bundles ${{ matrix.tauri_bundles }}

      - name: Collect artifact
        shell: bash
        run: |
          artifact_dir="artifacts/$PACKAGE_NAME"
          mkdir -p "$artifact_dir"

          if [[ "$PROJECT_LAYOUT" == "tauri" ]]; then
            if [[ ! -d "$RELEASE_DIR/bundle" ]]; then
              echo "Tauri bundle output was not found at $RELEASE_DIR/bundle." >&2
              exit 1
            fi

            files_copied=0
            while IFS= read -r -d '' file; do
              cp "$file" "$artifact_dir/"
              files_copied=$((files_copied + 1))
            done < <(find "$RELEASE_DIR/bundle" -type f \( \
              -name "*.exe" -o \
              -name "*.msi" -o \
              -name "*.dmg" -o \
              -name "*.AppImage" -o \
              -name "*.deb" -o \
              -name "*.rpm" \
            \) -print0)

            if (( files_copied == 0 )); then
              echo "No Tauri bundle files were found in $RELEASE_DIR/bundle." >&2
              exit 1
            fi
          else
            cp "$RELEASE_DIR/${{ matrix.binary }}" "$artifact_dir/"

            if [[ -f README.md ]]; then
              cp README.md "$artifact_dir/"
            fi
          fi

      - name: Package artifact
        shell: pwsh
        run: |
          $distDir = "dist"
          New-Item -ItemType Directory -Force -Path $distDir | Out-Null

          $artifactDir = Join-Path "artifacts" $env:PACKAGE_NAME
          if ($env:PROJECT_LAYOUT -eq "tauri") {
            Get-ChildItem -Path $artifactDir -File | Copy-Item -Destination $distDir -Force
          } elseif ($env:RUNNER_OS -eq "Windows") {
            Compress-Archive -Path (Join-Path $artifactDir "*") -DestinationPath (Join-Path $distDir "$env:PACKAGE_NAME.zip") -Force
          } else {
            tar -czf (Join-Path $distDir "$env:PACKAGE_NAME.tar.gz") -C $artifactDir .
          }

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: package-${{ matrix.artifact }}
          path: dist/*
          if-no-files-found: error

  release:
    name: Publish GitHub Release
    needs:
      - detect
      - build
    runs-on: ubuntu-latest
    if: needs.detect.outputs.project_layout == 'tauri' && (startsWith(github.ref, 'refs/tags/v') || (github.event_name == 'workflow_dispatch' && inputs.release_tag != ''))
    permissions:
      contents: write

    steps:
      - name: Download packaged artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: package-*
          path: release-assets
          merge-multiple: true

      - name: Publish release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ inputs.release_tag || github.ref_name }}
          PRERELEASE: ${{ inputs.prerelease || false }}
        run: |
          shopt -s nullglob
          assets=()
          while IFS= read -r -d '' asset; do
            assets+=("$asset")
          done < <(find release-assets -type f -print0)

          if (( ${#assets[@]} == 0 )); then
            echo "No release assets were downloaded." >&2
            exit 1
          fi

          release_exists=false
          if release_json="$(gh api "repos/$GITHUB_REPOSITORY/releases/tags/$RELEASE_TAG" 2>/dev/null)"; then
            release_exists=true
            while IFS= read -r asset_id; do
              if [[ -n "$asset_id" && "$asset_id" != "null" ]]; then
                gh api --method DELETE "repos/$GITHUB_REPOSITORY/releases/assets/$asset_id"
              fi
            done < <(jq -r '.assets[].id' <<< "$release_json")
          fi

          if [[ "$release_exists" == "true" ]]; then
            gh release upload "$RELEASE_TAG" "${assets[@]}" --repo "$GITHUB_REPOSITORY" --clobber
          else
            args=(--repo "$GITHUB_REPOSITORY" --target "$GITHUB_SHA" --title "$RELEASE_TAG" --generate-notes)
            if [[ "$PRERELEASE" == "true" ]]; then
              args+=(--prerelease)
            fi
            gh release create "$RELEASE_TAG" "${assets[@]}" "${args[@]}"
          fi
